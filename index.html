<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VOID HUNTER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; }
body { -webkit-user-select:none; user-select:none; }
#c { display:block; position:fixed; top:0; left:0; }
#ui {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:12px 14px 8px; pointer-events:none; z-index:5;
  background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0));
}
.col { display:flex; flex-direction:column; gap:2px; }
.lbl { font:9px monospace; color:#555; letter-spacing:2px; }
.val { font:bold 20px monospace; color:#ddd; line-height:1; }
#hpw { width:100px; height:5px; background:#1a1a1a; border-radius:3px; overflow:hidden; margin-top:1px; }
#hpf { height:100%; background:linear-gradient(90deg,#e02020,#ff6040); border-radius:3px; }
#xpw { width:100px; height:3px; background:#1a1a1a; border-radius:2px; overflow:hidden; margin-top:1px; }
#xpf { height:100%; background:linear-gradient(90deg,#00aaff,#0033ff); border-radius:2px; }
#ann {
  position:fixed; top:35%; left:0; right:0; text-align:center;
  font:bold 28px monospace; color:#ff2020; letter-spacing:5px;
  pointer-events:none; z-index:6; opacity:0;
  transition:opacity 0.4s; text-shadow:0 0 16px rgba(255,0,0,0.6);
}
#cmb {
  position:fixed; top:46%; left:0; right:0; text-align:center;
  font:bold 32px monospace; color:#ffcc00; letter-spacing:3px;
  pointer-events:none; z-index:6; opacity:0;
  transition:opacity 0.3s; text-shadow:0 0 16px rgba(255,180,0,0.6);
}
#bhp {
  position:fixed; bottom:150px; left:50%; transform:translateX(-50%);
  width:75%; max-width:320px; display:none; flex-direction:column;
  align-items:center; gap:3px; z-index:5; pointer-events:none;
}
#bname { font:9px monospace; color:#cc44ff; letter-spacing:3px; }
#bbar { width:100%; height:7px; background:#111; border-radius:3px; overflow:hidden; }
#bfill { height:100%; background:linear-gradient(90deg,#8800cc,#dd44ff); }
#upg {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:20;
  background:rgba(0,0,0,0.92); display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:20px;
}
#upg h2 { font:bold 20px monospace; color:#00ccff; letter-spacing:4px; }
#upg p  { font:10px monospace; color:#444; letter-spacing:2px; }
#ucards { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:420px; }
.uc {
  flex:1; min-width:100px; max-width:140px;
  border:1px solid #1a3a4a; background:#070f15;
  padding:12px 8px; border-radius:4px;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; text-align:center;
}
.uc:active { border-color:#00ccff; background:#0d1e2e; }
.ui { font-size:22px; }
.un { font:bold 10px monospace; color:#00ccff; letter-spacing:2px; }
.ud { font:9px monospace; color:#445; line-height:1.4; }
#scr {
  position:fixed; top:0; left:0; right:0; bottom:0; z-index:10;
  background:#000; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px; padding:24px;
}
#scr h1 {
  font:bold 44px monospace; letter-spacing:8px; color:#ff1818;
  text-shadow:0 0 28px rgba(255,0,0,0.5); text-align:center;
}
#scr p { font:11px monospace; color:#444; letter-spacing:2px; text-align:center; line-height:1.9; }
#scr small { font:10px monospace; color:#222; letter-spacing:2px; text-align:center; }
#go {
  margin-top:6px; background:transparent; border:1px solid #e02020; color:#e02020;
  font:bold 13px monospace; letter-spacing:3px; padding:13px 36px; cursor:pointer;
  border-radius:2px; -webkit-appearance:none;
}
#go:active { background:rgba(224,32,32,0.1); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="col">
    <div class="lbl">VOID HUNTER</div>
    <div id="hpw"><div id="hpf" style="width:100%"></div></div>
    <div id="xpw"><div id="xpf" style="width:0%"></div></div>
  </div>
  <div class="col" style="align-items:center">
    <div class="lbl">SCORE</div>
    <div class="val" id="sv">0</div>
  </div>
  <div class="col" style="align-items:flex-end">
    <div class="lbl">WAVE</div>
    <div class="val" id="wv">1</div>
    <div class="lbl" id="wpv">CANNON</div>
  </div>
</div>

<div id="ann"></div>
<div id="cmb"></div>

<div id="bhp">
  <div id="bname">VOID TITAN</div>
  <div id="bbar"><div id="bfill" style="width:100%"></div></div>
</div>

<div id="upg">
  <h2>LEVEL UP</h2>
  <p>CHOOSE AN UPGRADE</p>
  <div id="ucards"></div>
</div>

<div id="scr">
  <h1>VOID HUNTER</h1>
  <p>LEFT THUMB — MOVE<br>RIGHT THUMB — AIM + FIRE</p>
  <small>AUTO-FIRES WHILE AIMING</small>
  <button id="go">ENTER THE VOID</button>
</div>

<script>
window.addEventListener('load', function() {

  var c   = document.getElementById('c');
  var ctx = null;
  var W   = window.innerWidth;
  var H   = window.innerHeight;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    c.width  = W;
    c.height = H;
  }
  resize();
  ctx = c.getContext('2d');
  window.addEventListener('resize', resize);

  // DOM refs
  var sv    = document.getElementById('sv');
  var wv    = document.getElementById('wv');
  var hpf   = document.getElementById('hpf');
  var xpf   = document.getElementById('xpf');
  var annEl = document.getElementById('ann');
  var cmbEl = document.getElementById('cmb');
  var bhpEl = document.getElementById('bhp');
  var bfill = document.getElementById('bfill');
  var bnmEl = document.getElementById('bname');
  var wpv   = document.getElementById('wpv');
  var upgEl = document.getElementById('upg');
  var ucardsEl = document.getElementById('ucards');
  var scrEl = document.getElementById('scr');

  // ---- helpers ----
  function rnd(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,lo,hi){ return v<lo?lo:v>hi?hi:v; }
  function d2(ax,ay,bx,by){ var dx=ax-bx,dy=ay-by; return Math.sqrt(dx*dx+dy*dy); }
  function pi2(){ return Math.PI*2; }

  // ---- weapons ----
  var WP = {
    cannon: {name:'CANNON', col:'#88ccff', spd:13, br:4,  spr:0,    cnt:1, cd:9,  dmg:1, exp:false},
    spread: {name:'SPREAD', col:'#88ffcc', spd:11, br:4,  spr:0.22, cnt:3, cd:11, dmg:1, exp:false},
    laser:  {name:'LASER',  col:'#ff88ff', spd:19, br:3,  spr:0,    cnt:1, cd:4,  dmg:1, exp:false},
    rocket: {name:'ROCKET', col:'#ffaa44', spd:8,  br:6,  spr:0,    cnt:1, cd:22, dmg:4, exp:true},
    dual:   {name:'DUAL',   col:'#44ffff', spd:13, br:4,  spr:0,    cnt:2, cd:7,  dmg:1, exp:false},
  };

  var UPGS = [
    {n:'SPREAD', d:'3-way fire',      fn:function(g){g.pl.wp='spread';}},
    {n:'LASER',  d:'Rapid-fire',      fn:function(g){g.pl.wp='laser';}},
    {n:'ROCKET', d:'Explosive shots', fn:function(g){g.pl.wp='rocket';}},
    {n:'DUAL',   d:'Twin fire',       fn:function(g){g.pl.wp='dual';}},
    {n:'SPEED',  d:'40% faster',      fn:function(g){g.pl.spd=Math.min(g.pl.spd*1.4,9);}},
    {n:'SHIELD', d:'Block one hit',   fn:function(g){g.pl.shld=true;}},
    {n:'HEAL',   d:'Restore 50 HP',   fn:function(g){g.pl.hp=Math.min(g.pl.mhp,g.pl.hp+50);}},
    {n:'POWER',  d:'Damage x2',       fn:function(g){g.pl.dmg*=2;}},
    {n:'MAGNET', d:'Pull in orbs',    fn:function(g){g.pl.mag=true;}},
  ];

  // ---- bg ----
  var neb=[], sts=[];
  function mkBg(){
    var i; neb=[]; sts=[];
    for(i=0;i<5;i++) neb.push({x:Math.random(),y:Math.random(),r:0.2+Math.random()*0.4,h:180+Math.random()*140,a:0.04+Math.random()*0.07});
    for(i=0;i<160;i++) sts.push({x:Math.random(),y:Math.random(),r:0.2+Math.random()*1.3,t:Math.random()*6.28,s:0.01+Math.random()*0.04});
  }
  mkBg();

  // ---- state ----
  var G=null, raf=null;
  var dnums=[], orbs=[];
  var shk={x:0,y:0,m:0,d:0};
  function shake(m,d){ if(m>shk.m){shk.m=m;shk.d=d;} }
  function dmnum(x,y,v,col){ dnums.push({x:x,y:y,v:Math.round(v),c:col||'#fff',l:1,vy:-1.5}); }
  function orb(x,y,v){ var a=Math.random()*pi2(); orbs.push({x:x,y:y,v:v,r:6,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5-1,dead:false}); }

  function newGame(){
    G={
      pl:{x:W/2,y:H/2,r:15,spd:3.4,hp:100,mhp:100,inv:0,shld:false,ang:0,wp:'cannon',dmg:1,mag:false,trail:[],xp:0,nxp:80,lv:1},
      buls:[],ens:[],parts:[],boss:null,
      sc:0,wv:1,wtmr:0,wact:false,
      combo:0,ctmr:0,scd:0,tick:0,over:false,upging:false
    };
    orbs=[]; dnums=[]; shk={x:0,y:0,m:0,d:0};
    hud(); spawnWave();
  }

  function announce(txt){
    annEl.textContent=txt; annEl.style.opacity='1';
    setTimeout(function(){ annEl.style.opacity='0'; }, 1800);
  }

  function spawnWave(){
    G.wact=true;
    if(G.wv%5===0){ spawnBoss(); announce('BOSS WAVE '+G.wv); }
    else {
      var n=5+G.wv*2, i;
      for(i=0;i<n;i++){
        (function(ms){ setTimeout(function(){ if(G&&G.wact) spawnEn(); }, ms); })(i*160);
      }
      announce('WAVE '+G.wv);
    }
  }

  function spawnEn(){
    if(!G||!G.wact) return;
    var s=Math.floor(Math.random()*4), x, y;
    if(s===0){x=rnd(0,W);y=-30;}
    else if(s===1){x=W+30;y=rnd(0,H);}
    else if(s===2){x=rnd(0,W);y=H+30;}
    else{x=-30;y=rnd(0,H);}
    var r=Math.random(), t='basic';
    if(G.wv>=6&&r<0.15) t='sniper';
    else if(G.wv>=4&&r<0.25) t='tank';
    else if(r<0.2) t='fast';
    var cf={
      basic: {r:13,hp:2,        spd:1.2+G.wv*0.12,col:'#cc2020',sc:10,sr:0.4, st:40,schg:0},
      fast:  {r:9, hp:1,        spd:2.5+G.wv*0.18,col:'#ff6600',sc:20,sr:0.6, st:30,schg:0},
      tank:  {r:22,hp:7+G.wv,   spd:0.75,         col:'#8800cc',sc:50,sr:0.25,st:60,schg:0},
      sniper:{r:11,hp:2,        spd:1.0,          col:'#00ccff',sc:35,sr:0,   st:0, schg:120},
    }[t];
    G.ens.push({x:x,y:y,t:t,r:cf.r,hp:cf.hp,mhp:cf.hp,spd:cf.spd,col:cf.col,sc:cf.sc,sr:cf.sr,st:rnd(0,cf.st),ang:0,schg:cf.schg,dead:false});
  }

  function spawnBoss(){
    var ts=[
      {n:'VOID TITAN', r:45,hp:200+G.wv*30,col:'#ff00aa',sc:500},
      {n:'DEATH STAR', r:50,hp:160+G.wv*25,col:'#00ffaa',sc:600},
      {n:'DARK HERALD',r:38,hp:140+G.wv*20,col:'#ffaa00',sc:700},
    ];
    var idx=Math.floor((G.wv-5)/5)%ts.length;
    if(idx<0)idx=0;
    var b=ts[idx];
    G.boss={x:W/2,y:-80,r:b.r,hp:b.hp,mhp:b.hp,col:b.col,nm:b.n,sc:b.sc,orb:0,st:0,rage:false};
    bnmEl.textContent=b.n;
    bhpEl.style.display='flex';
  }

  function bust(x,y,col,n,ms){
    var i,a,s;
    for(i=0;i<n;i++){ a=Math.random()*pi2(); s=rnd(1,ms||4); G.parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,r:rnd(2,5),col:col,glow:false}); }
  }
  function boom(x,y,rad,col){
    var n=Math.min(Math.floor(rad*1.2),50),i,a,s;
    for(i=0;i<n;i++){ a=Math.random()*pi2(); s=rnd(1,rad*0.15); G.parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,r:rnd(2,7),col:col,glow:true}); }
    shake(rad*0.35,12);
  }

  function shoot(ang){
    var pl=G.pl, w=WP[pl.wp], dm=w.dmg*pl.dmg, i, a, px, py;
    if(w.cnt===1){
      a=ang+rnd(-w.spr,w.spr);
      G.buls.push({x:pl.x,y:pl.y,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,r:w.br,l:1,tm:1,col:w.col,dm:dm,exp:w.exp});
    } else if(w.cnt===2){
      px=Math.sin(ang)*8; py=-Math.cos(ang)*8;
      G.buls.push({x:pl.x+px,y:pl.y+py,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,r:w.br,l:1,tm:1,col:w.col,dm:dm,exp:false});
      G.buls.push({x:pl.x-px,y:pl.y-py,vx:Math.cos(ang)*w.spd,vy:Math.sin(ang)*w.spd,r:w.br,l:1,tm:1,col:w.col,dm:dm,exp:false});
    } else {
      for(i=0;i<w.cnt;i++){ a=ang+(i-(w.cnt-1)/2)*w.spr; G.buls.push({x:pl.x,y:pl.y,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,r:w.br,l:1,tm:1,col:w.col,dm:dm,exp:false}); }
    }
  }

  function hitEn(e,dm,bx,by){
    if(e.dead)return; e.hp-=dm; dmnum(e.x,e.y-e.r-6,dm,'#fff'); bust(bx||e.x,by||e.y,e.col,5,4); shake(3,5);
    if(e.hp<=0) killEn(e);
  }
  function killEn(e){
    if(e.dead)return; e.dead=true; boom(e.x,e.y,e.r*2,e.col);
    G.sc+=e.sc*G.wv; G.combo++; G.ctmr=120;
    if(G.combo>=3){ cmbEl.textContent='x'+G.combo+' COMBO'; cmbEl.style.opacity='1'; G.sc+=G.combo*5; }
    G.pl.xp+=e.sc; if(G.pl.xp>=G.pl.nxp) lvlUp();
    if(Math.random()<0.35) orb(e.x,e.y,e.sc);
  }
  function hitBoss(dm,bx,by){
    if(!G.boss)return;
    var b=G.boss, d=dm*G.pl.dmg;
    b.hp-=d; dmnum(bx||b.x,(by||b.y)-b.r-6,d,'#cc44ff'); bust(bx||b.x,by||b.y,b.col,6,5); shake(5,7);
    bfill.style.width=Math.max(0,b.hp/b.mhp*100)+'%';
    if(!b.rage&&b.hp/b.mhp<0.5){ b.rage=true; announce('ENRAGED!'); shake(15,30); }
    if(b.hp<=0){ boom(b.x,b.y,b.r*4,b.col); G.sc+=b.sc*G.wv; G.boss=null; bhpEl.style.display='none'; announce('BOSS SLAIN!'); shake(20,40); G.pl.hp=Math.min(G.pl.mhp,G.pl.hp+30); }
  }
  function hurtPl(dm){
    var pl=G.pl; if(pl.inv>0)return;
    if(pl.shld){ pl.shld=false; boom(pl.x,pl.y,30,'#00ccff'); shake(5,10); return; }
    pl.hp-=dm; pl.inv=35; bust(pl.x,pl.y,'#ff3030',12,4); shake(8,16);
    if(pl.hp<=0) endGame();
  }

  function lvlUp(){
    var i, pool, card;
    G.pl.xp-=G.pl.nxp; G.pl.nxp=Math.floor(G.pl.nxp*1.55); G.pl.lv++;
    G.upging=true;
    pool=UPGS.slice().sort(function(){ return Math.random()-0.5; }).slice(0,3);
    ucardsEl.innerHTML='';
    for(i=0;i<pool.length;i++){
      (function(u){
        var card=document.createElement('div'); card.className='uc';
        card.innerHTML='<div class="ui">+</div><div class="un">'+u.n+'</div><div class="ud">'+u.d+'</div>';
        function pick(){ u.fn(G); upgEl.style.display='none'; G.upging=false; }
        card.addEventListener('touchend',function(ev){ ev.preventDefault(); pick(); },false);
        card.addEventListener('click',pick,false);
        ucardsEl.appendChild(card);
      })(pool[i]);
    }
    upgEl.style.display='flex';
  }

  function hud(){
    var pl=G.pl;
    sv.textContent=''+G.sc;
    wv.textContent=''+G.wv;
    hpf.style.width=clamp(pl.hp/pl.mhp*100,0,100)+'%';
    xpf.style.width=clamp(pl.xp/pl.nxp*100,0,100)+'%';
    wpv.textContent=WP[pl.wp].name+' L'+pl.lv;
  }

  // ---- input ----
  var jAct=false, jOx=0, jOy=0, jDx=0, jDy=0, jId=null;
  var aAct=false, aPx=0, aPy=0, aId=null, aAng=0;
  var keys={};

  function txy(t){ var r=c.getBoundingClientRect(); return {x:t.clientX-r.left, y:t.clientY-r.top}; }

  c.addEventListener('touchstart',function(ev){
    ev.preventDefault();
    var tl=ev.changedTouches, i, t, p;
    for(i=0;i<tl.length;i++){
      t=tl[i]; p=txy(t);
      if(p.x<W*0.5&&!jAct){ jId=t.identifier; jOx=p.x; jOy=p.y; jDx=0; jDy=0; jAct=true; }
      else if(p.x>=W*0.5&&!aAct){ aId=t.identifier; aPx=p.x; aPy=p.y; aAct=true; if(G)G.scd=0; }
    }
  },false);

  c.addEventListener('touchmove',function(ev){
    ev.preventDefault();
    var tl=ev.changedTouches, i, t, p, dx, dy, d, s;
    for(i=0;i<tl.length;i++){
      t=tl[i]; p=txy(t);
      if(t.identifier===jId){ dx=p.x-jOx; dy=p.y-jOy; d=Math.sqrt(dx*dx+dy*dy); s=Math.min(d/62,1); jDx=d>0?dx/d*s:0; jDy=d>0?dy/d*s:0; }
      if(t.identifier===aId){ aPx=p.x; aPy=p.y; }
    }
  },false);

  c.addEventListener('touchend',function(ev){
    ev.preventDefault();
    var tl=ev.changedTouches, i, t;
    for(i=0;i<tl.length;i++){ t=tl[i]; if(t.identifier===jId){jAct=false;jDx=0;jDy=0;jId=null;} if(t.identifier===aId){aAct=false;aId=null;} }
  },false);

  c.addEventListener('touchcancel',function(){ jAct=false;jDx=0;jDy=0;jId=null;aAct=false;aId=null; },false);
  window.addEventListener('keydown',function(e){keys[e.key]=true;},false);
  window.addEventListener('keyup',function(e){keys[e.key]=false;},false);
  c.addEventListener('mousemove',function(e){ var r=c.getBoundingClientRect(); aPx=e.clientX-r.left; aPy=e.clientY-r.top; },false);
  c.addEventListener('mousedown',function(){ aAct=true; if(G)G.scd=0; },false);
  c.addEventListener('mouseup',function(){ aAct=false; },false);

  // ---- update ----
  function update(){
    if(!G||G.over||G.upging)return;
    G.tick++;
    var pl=G.pl, i, j, k, e, b, o, a, ang, dx, dy, d, tx, ty, shots, bi;

    dx=0; dy=0;
    if(jAct){dx=jDx;dy=jDy;}
    else{ if(keys['a']||keys['ArrowLeft'])dx=-1; if(keys['d']||keys['ArrowRight'])dx=1; if(keys['w']||keys['ArrowUp'])dy=-1; if(keys['s']||keys['ArrowDown'])dy=1; if(dx&&dy){dx*=0.707;dy*=0.707;} }
    pl.x=clamp(pl.x+dx*pl.spd,pl.r,W-pl.r);
    pl.y=clamp(pl.y+dy*pl.spd,pl.r,H-pl.r);

    if(aAct) aAng=Math.atan2(aPy-pl.y,aPx-pl.x);
    else aAng=Math.atan2(aPy-pl.y,aPx-pl.x);
    pl.ang=aAng;

    pl.trail.push({x:pl.x,y:pl.y,t:1});
    if(pl.trail.length>16) pl.trail.shift();
    for(i=0;i<pl.trail.length;i++) pl.trail[i].t-=0.06;
    if(pl.inv>0) pl.inv--;

    if(G.scd>0)G.scd--;
    if(aAct&&G.scd<=0){ shoot(aAng); G.scd=WP[pl.wp].cd; }

    if(G.ctmr>0){G.ctmr--;if(G.ctmr===0){G.combo=0;cmbEl.style.opacity='0';}}

    for(i=orbs.length-1;i>=0;i--){
      o=orbs[i];
      if(pl.mag||d2(o.x,o.y,pl.x,pl.y)<80){ a=Math.atan2(pl.y-o.y,pl.x-o.x); o.x+=Math.cos(a)*5; o.y+=Math.sin(a)*5; }
      else{ o.x+=o.vx; o.y+=o.vy; o.vy+=0.06; }
      if(d2(o.x,o.y,pl.x,pl.y)<pl.r+o.r){ G.sc+=o.v; o.dead=true; }
      if(o.y>H+60) o.dead=true;
      if(o.dead) orbs.splice(i,1);
    }

    var bint=Math.max(48-G.wv*2,14);
    for(i=0;i<G.ens.length;i++){
      e=G.ens[i]; if(e.dead)continue;
      ang=Math.atan2(pl.y-e.y,pl.x-e.x); e.ang=ang;
      if(e.t==='sniper'){
        e.schg--; e.x+=Math.cos(ang+0.88)*e.spd; e.y+=Math.sin(ang+0.88)*e.spd;
        if(e.schg<=0){ G.buls.push({x:e.x,y:e.y,vx:Math.cos(ang)*17,vy:Math.sin(ang)*17,r:3,l:1,tm:0,col:'#00ccff',dm:15,exp:false}); e.schg=rnd(80,150); shake(2,4); }
      } else {
        e.x+=Math.cos(ang)*e.spd; e.y+=Math.sin(ang)*e.spd;
        if(e.sr>0){ e.st--; if(e.st<=0){ if(Math.random()<e.sr) G.buls.push({x:e.x,y:e.y,vx:Math.cos(ang)*4.5,vy:Math.sin(ang)*4.5,r:5,l:1,tm:0,col:e.col,dm:10,exp:false}); e.st=bint; } }
      }
    }

    if(G.boss){
      b=G.boss; b.orb+=0.008;
      tx=W/2+Math.cos(b.orb)*W*0.3; ty=H*0.35+Math.sin(b.orb)*H*0.15;
      b.x+=(tx-b.x)*0.022; b.y+=(ty-b.y)*0.022;
      b.st++; var rate=b.rage?18:32;
      if(b.st>=rate){ b.st=0; shots=b.rage?8:5; for(i=0;i<shots;i++){ a=Math.atan2(pl.y-b.y,pl.x-b.x)+(i/shots)*pi2(); G.buls.push({x:b.x,y:b.y,vx:Math.cos(a)*5.5,vy:Math.sin(a)*5.5,r:7,l:1,tm:0,col:b.col,dm:18,exp:false}); } shake(4,8); }
    }

    for(i=0;i<G.buls.length;i++){ b=G.buls[i]; b.x+=b.vx; b.y+=b.vy; if(b.x<-50||b.x>W+50||b.y<-50||b.y>H+50)b.l=0; }

    for(i=0;i<G.buls.length;i++){
      b=G.buls[i]; if(b.tm!==1||b.l===0)continue;
      for(j=0;j<G.ens.length;j++){
        e=G.ens[j]; if(e.dead)continue;
        if(d2(b.x,b.y,e.x,e.y)<b.r+e.r){
          b.l=0;
          if(b.exp){ boom(b.x,b.y,50,'#ffaa44'); for(k=0;k<G.ens.length;k++){ if(!G.ens[k].dead&&d2(b.x,b.y,G.ens[k].x,G.ens[k].y)<55) hitEn(G.ens[k],b.dm*0.7,b.x,b.y); } if(G.boss&&d2(b.x,b.y,G.boss.x,G.boss.y)<55) hitBoss(b.dm,b.x,b.y); }
          else hitEn(e,b.dm,b.x,b.y);
          break;
        }
      }
      if(b.l&&G.boss&&d2(b.x,b.y,G.boss.x,G.boss.y)<b.r+G.boss.r){ b.l=0; if(b.exp){boom(b.x,b.y,50,'#ffaa44');hitBoss(b.dm*1.5,b.x,b.y);}else hitBoss(b.dm,b.x,b.y); }
    }

    for(i=0;i<G.buls.length;i++){ b=G.buls[i]; if(b.tm!==0||b.l===0)continue; if(d2(b.x,b.y,pl.x,pl.y)<b.r+pl.r){b.l=0;hurtPl(b.dm||10);} }
    for(i=0;i<G.ens.length;i++){ e=G.ens[i]; if(!e.dead&&d2(e.x,e.y,pl.x,pl.y)<e.r+pl.r) hurtPl(15); }

    for(i=G.buls.length-1;i>=0;i--){ if(G.buls[i].l===0) G.buls.splice(i,1); }
    for(i=G.ens.length-1;i>=0;i--){ if(G.ens[i].dead) G.ens.splice(i,1); }
    for(i=0;i<G.parts.length;i++){ var pt=G.parts[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.vx*=0.91; pt.vy*=0.91; pt.l-=0.03; }
    for(i=G.parts.length-1;i>=0;i--){ if(G.parts[i].l<=0) G.parts.splice(i,1); }
    for(i=0;i<dnums.length;i++){ dnums[i].y+=dnums[i].vy; dnums[i].l-=0.025; }
    for(i=dnums.length-1;i>=0;i--){ if(dnums[i].l<=0) dnums.splice(i,1); }

    if(shk.d>0){ shk.d--; var f=shk.d/12; shk.x=(Math.random()-0.5)*shk.m*f; shk.y=(Math.random()-0.5)*shk.m*f; } else{ shk.x=0;shk.y=0;shk.m=0; }

    if(G.wact&&G.ens.length===0&&!G.boss){ G.wact=false; G.wtmr=150; }
    if(!G.wact&&G.wtmr>0){ G.wtmr--; if(G.wtmr===0){ G.wv++; hud(); spawnWave(); } }
    hud();
  }

  // ---- draw ----
  function draw(){
    if(!G||!ctx)return;
    var pl=G.pl, w=WP[pl.wp], i, n, s, o, pt, tr, b, e, grd, a, rad, k, kx, ky, dn, flash;

    ctx.save(); ctx.translate(shk.x,shk.y);
    ctx.fillStyle='#02020a'; ctx.fillRect(-10,-10,W+20,H+20);

    for(i=0;i<neb.length;i++){
      n=neb[i];
      grd=ctx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,n.r*Math.max(W,H));
      grd.addColorStop(0,'hsla('+n.h+',75%,25%,'+n.a+')');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
    }

    for(i=0;i<sts.length;i++){
      s=sts[i]; s.t+=s.s;
      ctx.globalAlpha=0.3+Math.abs(Math.sin(s.t))*0.5;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,pi2()); ctx.fill();
    }
    ctx.globalAlpha=1;

    ctx.strokeStyle='#0a0a18'; ctx.lineWidth=1;
    for(i=0;i<W;i+=60){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
    for(i=0;i<H;i+=60){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

    for(i=0;i<orbs.length;i++){ o=orbs[i]; ctx.save(); ctx.shadowBlur=12; ctx.shadowColor='#ffcc00'; ctx.fillStyle='#ffee44'; ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,pi2()); ctx.fill(); ctx.restore(); }

    for(i=0;i<G.parts.length;i++){ pt=G.parts[i]; ctx.save(); ctx.globalAlpha=pt.l*0.9; if(pt.glow){ctx.shadowBlur=14;ctx.shadowColor=pt.col;} ctx.fillStyle=pt.col; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*pt.l,0,pi2()); ctx.fill(); ctx.restore(); }
    ctx.globalAlpha=1;

    for(i=0;i<pl.trail.length;i++){ tr=pl.trail[i]; ctx.globalAlpha=Math.max(0,tr.t*0.25); ctx.fillStyle='hsl('+(210+i*3)+',80%,65%)'; ctx.beginPath(); ctx.arc(tr.x,tr.y,5*tr.t,0,pi2()); ctx.fill(); }
    ctx.globalAlpha=1;

    for(i=0;i<G.buls.length;i++){ b=G.buls[i]; if(b.tm!==0)continue; ctx.save(); ctx.shadowBlur=10; ctx.shadowColor=b.col; ctx.fillStyle=b.col; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,pi2()); ctx.fill(); ctx.restore(); }
    for(i=0;i<G.buls.length;i++){ b=G.buls[i]; if(b.tm!==1)continue; ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=w.col; ctx.fillStyle=w.col; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,pi2()); ctx.fill(); if(b.exp){ctx.globalAlpha=0.2;ctx.beginPath();ctx.arc(b.x,b.y,b.r*3.5,0,pi2());ctx.fill();} ctx.restore(); }

    for(i=0;i<G.ens.length;i++){
      e=G.ens[i]; if(e.dead)continue;
      ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(e.ang); ctx.shadowBlur=16; ctx.shadowColor=e.col;
      if(e.t==='sniper'){ var pct=clamp(1-e.schg/120,0,1); ctx.globalAlpha=0.1+pct*0.3; ctx.fillStyle=e.col; ctx.beginPath(); ctx.arc(0,0,e.r+14*pct,0,pi2()); ctx.fill(); ctx.globalAlpha=1; }
      ctx.fillStyle=e.col;
      if(e.t==='basic'){ctx.beginPath();ctx.moveTo(e.r,0);ctx.lineTo(0,e.r);ctx.lineTo(-e.r,0);ctx.lineTo(0,-e.r);ctx.closePath();ctx.fill();}
      else if(e.t==='fast'){ctx.beginPath();ctx.moveTo(e.r,0);ctx.lineTo(-e.r,-e.r*0.7);ctx.lineTo(-e.r*0.4,0);ctx.lineTo(-e.r,e.r*0.7);ctx.closePath();ctx.fill();}
      else if(e.t==='sniper'){ctx.beginPath();for(k=0;k<3;k++){a=(k/3)*pi2();if(k===0)ctx.moveTo(Math.cos(a)*e.r,Math.sin(a)*e.r);else ctx.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r);}ctx.closePath();ctx.fill();}
      else{ctx.beginPath();for(k=0;k<6;k++){a=(k/6)*pi2();if(k===0)ctx.moveTo(Math.cos(a)*e.r,Math.sin(a)*e.r);else ctx.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r);}ctx.closePath();ctx.fill();ctx.rotate(-e.ang);ctx.fillStyle='#1a1a2a';ctx.fillRect(-20,e.r+5,40,5);ctx.fillStyle=e.col;ctx.fillRect(-20,e.r+5,40*clamp(e.hp/e.mhp,0,1),5);}
      ctx.restore();
    }

    if(G.boss){
      b=G.boss; ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(G.tick*0.015);
      ctx.shadowBlur=b.rage?40:24; ctx.shadowColor=b.col;
      ctx.globalAlpha=0.2+Math.sin(G.tick*0.05)*0.08; ctx.strokeStyle=b.col; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,b.r+18+Math.sin(G.tick*0.08)*5,0,pi2()); ctx.stroke(); ctx.globalAlpha=1;
      ctx.fillStyle=b.col; ctx.beginPath();
      for(k=0;k<16;k++){a=(k/16)*pi2();rad=k%2===0?b.r:b.r*0.55;if(k===0)ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);else ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);}
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#fff'; ctx.globalAlpha=0.25; ctx.beginPath(); ctx.arc(0,0,b.r*0.28,0,pi2()); ctx.fill();
      ctx.restore(); ctx.globalAlpha=1;
    }

    flash=pl.inv>0&&Math.floor(pl.inv/4)%2===0;
    ctx.save(); ctx.translate(pl.x,pl.y); ctx.rotate(pl.ang);
    if(flash) ctx.globalAlpha=0.25;
    ctx.shadowBlur=pl.shld?30:18; ctx.shadowColor=pl.shld?'#00ccff':'#3355ff';
    if(pl.shld){ctx.globalAlpha=flash?0.07:0.2;ctx.strokeStyle='#00ccff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,pl.r+11,0,pi2());ctx.stroke();if(!flash)ctx.globalAlpha=1;}
    ctx.fillStyle='#ccdeff'; ctx.beginPath(); ctx.moveTo(pl.r,0); ctx.lineTo(-pl.r+4,-pl.r*0.75); ctx.lineTo(-pl.r+2,0); ctx.lineTo(-pl.r+4,pl.r*0.75); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#88aaff'; ctx.beginPath(); ctx.arc(2,0,5,0,pi2()); ctx.fill();
    ctx.fillStyle='#5577ff'; ctx.globalAlpha=(flash?0.07:1)*(0.5+Math.random()*0.35); ctx.beginPath(); ctx.arc(-pl.r+3,0,4+Math.random()*2,0,pi2()); ctx.fill();
    ctx.restore(); ctx.globalAlpha=1;

    if(aAct){
      ctx.save();
      ctx.strokeStyle='rgba(255,80,80,0.3)'; ctx.lineWidth=1.5; ctx.setLineDash([4,7]);
      ctx.beginPath(); ctx.moveTo(pl.x,pl.y); ctx.lineTo(pl.x+Math.cos(aAng)*90,pl.y+Math.sin(aAng)*90); ctx.stroke();
      ctx.setLineDash([]); ctx.strokeStyle='rgba(255,48,48,0.4)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(aPx,aPy,11,0,pi2()); ctx.stroke();
      ctx.restore();
    }
    if(jAct){
      kx=jOx+jDx*62; ky=jOy+jDy*62;
      ctx.save(); ctx.globalAlpha=0.25; ctx.strokeStyle='rgba(160,160,255,0.25)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(jOx,jOy,62,0,pi2()); ctx.stroke();
      ctx.globalAlpha=0.45; ctx.fillStyle='rgba(70,110,255,0.3)'; ctx.beginPath(); ctx.arc(kx,ky,24,0,pi2()); ctx.fill();
      ctx.strokeStyle='rgba(60,100,255,0.65)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(kx,ky,24,0,pi2()); ctx.stroke(); ctx.restore();
    }

    for(i=0;i<dnums.length;i++){
      dn=dnums[i]; ctx.save(); ctx.globalAlpha=dn.l; ctx.fillStyle=dn.c;
      ctx.font='bold '+clamp(11+dn.v*0.3,11,24)+'px monospace'; ctx.textAlign='center'; ctx.shadowBlur=6; ctx.shadowColor=dn.c;
      ctx.fillText(''+dn.v,dn.x,dn.y); ctx.restore();
    }

    ctx.restore();
  }

  function endGame(){
    if(!G)return; G.over=true;
    if(raf){cancelAnimationFrame(raf);raf=null;}
    bhpEl.style.display='none';
    scrEl.innerHTML='<h1 style="font-size:32px;letter-spacing:4px;color:#ff1818">VOID CLAIMED YOU</h1>'
      +'<p style="color:#555">SCORE <span style="color:#ff3030;font-size:26px">'+G.sc+'</span></p>'
      +'<small style="color:#333">WAVE '+G.wv+' &nbsp; LEVEL '+G.pl.lv+'</small>'
      +'<button id="go" class="sbtn">TRY AGAIN</button>';
    scrEl.style.display='flex';
    var btn=document.getElementById('go');
    btn.addEventListener('click',startGame,false);
    btn.addEventListener('touchend',function(ev){ev.preventDefault();startGame();},false);
  }

  function loop(){ update(); draw(); raf=requestAnimationFrame(loop); }

  function startGame(){
    if(raf){cancelAnimationFrame(raf);raf=null;}
    scrEl.style.display='none'; upgEl.style.display='none'; bhpEl.style.display='none';
    jAct=false; aAct=false; jDx=0; jDy=0;
    newGame(); loop();
  }

  var goBtn=document.getElementById('go');
  goBtn.addEventListener('click',startGame,false);
  goBtn.addEventListener('touchend',function(ev){ev.preventDefault();startGame();},false);

}); // end window.load
</script>
